name: Labeler

on:
  pull_request:
    # opened, reopened, and synchronize are default for pull_request
    # edited - when PR title or body is changed
    # labeled - when labels are added to PR
    types: [opened, reopened, synchronize, edited, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {} # Disable default permissions

jobs:

  label-syncer:
    name: Syncer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  labeler:
    name: Set labels
    needs: [label-syncer]
    permissions:
      contents: read
      pull-requests: write # Needed to add existing labels to PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:

      # Label based on modified files
      - name: Label based on changed files
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

      # Label based on branch name
      - name: Label docs
        if: startsWith(github.event.pull_request.head.ref, 'docs')
        run: gh pr edit "$PR_NUMBER" --add-label "documentation" --repo ansys/pyaedt-toolkits-common

      - name: Label maintenance
        if: |
          startsWith(github.event.pull_request.head.ref, 'maint') ||
          startsWith(github.event.pull_request.head.ref, 'ci')
        run: gh pr edit "$PR_NUMBER" --add-label "maintenance" --repo ansys/pyaedt-toolkits-common

      - name: Label enhancement
        if: startsWith(github.event.pull_request.head.ref, 'feat')
        run: gh pr edit "$PR_NUMBER" --add-label "enhancement" --repo ansys/pyaedt-toolkits-common

      - name: Label bug
        if: startsWith(github.event.pull_request.head.ref, 'fix')
        run: gh pr edit "$PR_NUMBER" --add-label "bug" --repo ansys/pyaedt-toolkits-common

      - name: Label testing
        if: startsWith(github.event.pull_request.head.ref, 'test')
        run: gh pr edit "$PR_NUMBER" --add-label "testing" --repo ansys/pyaedt-toolkits-common

  commenter:
    name: Suggest labels if none assigned
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Needed to create deployment comments on PRs
    steps:
    - name: Suggest to add labels
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      # Execute only when no labels have been applied to the pull request
      if: toJSON(github.event.pull_request.labels.*.name) == '{}'
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Please add one of the following labels to add this contribution to the Release Notes :point_down:
          - [bug](https://github.com/pyansys/pyaedt-toolkits.git/pulls?q=label%3Abug+)
          - [documentation](https://github.com/pyansys/pyaedt-toolkits.git/pulls?q=label%3Adocumentation+)
          - [enhancement](https://github.com/pyansys/pyaedt-toolkits.git/pulls?q=label%3Aenhancement+)
          - [good first issue](https://github.com/pyansys/pyaedt-toolkits.git/pulls?q=label%3Agood+first+issue)
          - [maintenance](https://github.com/pyansys/pyaedt-toolkits.git/pulls?q=label%3Amaintenance+)
          - [release](https://github.com/pyansys/pyaedt-toolkits.git/pulls?q=label%3Arelease+)

  changelog-fragment:
    name: Create changelog fragment file
    needs: [labeler]
    permissions:
      contents: write # Needed to create changelog fragment on PR
      pull-requests: write # Needed to create changelog fragment on PR
    runs-on: ubuntu-latest
    steps:
    - uses: ansys/actions/doc-changelog@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55 # v10.3.3
      with:
        bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
        bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
        token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        use-default-towncrier-config: true
        use-pull-request-title: true
