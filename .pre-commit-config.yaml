ci:
    autofix_commit_msg: 'CHORE: Auto fixes from pre-commit hooks'
    autoupdate_branch: 'chore/pre-commit-autoupdate'
    autoupdate_commit_msg: 'CHORE: Pre-commit automatic update'
    autoupdate_schedule: weekly

exclude: |
    (?x)(
        src/ansys/aedt/toolkits/common/ui/utils/ui_templates/.* |
        tests/.* |
        examples/.* |
        doc/getting_started/installation.rst |
        README.rst
    )

repos:

- repo: https://github.com/psf/black
  rev: 87928e6d6761a4a6d22250e1fee5601b3998086e  # frozen: 26.5.1
  hooks:
    - id: black
      args:
        - --line-length=120

- repo: https://github.com/pycqa/isort
  rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
  hooks:
    - id: isort
      name: isort (python)
      args: ['--force-single-line-imports', '--profile', 'black']

- repo: https://github.com/PyCQA/flake8
  rev: c48217e1fc006c2dddd14df54e83b67da15de5cd  # frozen: 7.3.0
  hooks:
    - id: flake8
      args:
        - --max-line-length=120

- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
  hooks:
    - id: codespell
      args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt"]
      additional_dependencies:
        - tomli

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
    - id: debug-statements
    - id: trailing-whitespace

# Validate GitHub workflow files
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 5030dca3047414c338091455ac41803200ec1f0f  # frozen: 0.37.3
  hooks:
    - id: check-github-workflows

- repo: https://github.com/adamchainz/blacken-docs
  rev: fda77690955e9b63c6687d8806bafd56a526e45f  # frozen: 1.20.0
  hooks:
    - id: blacken-docs
      additional_dependencies: [black==26.5.1]

# This validates our pre-commit.ci configuration
- repo: https://github.com/pre-commit-ci/pre-commit-ci-config
  rev: 500543de231a91e6157db630075d70320709b834  # frozen: v1.6.1
  hooks:
    - id: check-pre-commit-ci-config

- repo: https://github.com/ansys/pre-commit-hooks
  rev: 55c5b6a5439abd847613579c6924da750e8b78b2  # frozen: v0.8.0
  hooks:
    - id: add-license-headers
      files: '(src|examples|tests)/.*\.(py)'
      args:
      - --custom_template=mit_license.jinja2
      - --start_year=2023

